objective: rmse
direction: minimize
sampler: tpe
seed: 42

search_space:
  lr:
    type: float
    low: 1.0e-5
    high: 1.0e-2
    log: true
  hidden_size:
    type: categorical
    choices: [64, 128, 256, 512]
  num_layers:
    type: int
    low: 3
    high: 8
  physics_weight:
    type: float
    low: 0.01
    high: 1.0
    log: true
  weight_decay:
    type: float
    low: 1.0e-6
    high: 1.0e-3
    log: true

defaults:
  n_trials: 50
  epochs_per_trial: 20
